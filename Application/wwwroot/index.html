<!DOCTYPE html>
<html lang="en" class="no-transitions">

<head>
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json" />
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="autocomplete" content="off">

    <title>Discogg</title>
    <base href="/" />

    <!-- CSS -->
    
    <script>
        // Apply theme BEFORE CSS loads (prevents white flashing)
        const theme = localStorage.getItem("data-theme") || "dark";
        document.documentElement.setAttribute("data-theme", theme);
    </script>

    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Application.styles.css" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/images.css" />

    <!-- JS -->
    <script src="js/themes.js" defer></script>
    <script src="js/localStorage.js" defer></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- Boot-time loader -->
        <div id="loading-screen">
            <img src="images/vinyl.png" class="vinyl-spin" id="vinyl-loader" />
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
</body>

</html>

<script>
    Blazor.start({
        loadBootResource: (type, name, defaultUri, integrity) => defaultUri,
        onProgress: (loaded, total) => {
            if (loaded === total) {
                setTimeout(() => {
                    document.getElementById("loading-screen").style.opacity = "0";

                    // Enable transitions after load
                    document.documentElement.classList.remove("no-transitions");

                    setTimeout(() => {
                        document.getElementById("loading-screen").remove();
                    }, 300);
                }, 200);
            }
        }
    });
</script>
