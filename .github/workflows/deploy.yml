name: Deploy Blazor WebAssembly to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install JS Obfuscator
      run: npm install -g javascript-obfuscator

    - name: Publish Blazor WebAssembly
      run: dotnet publish -c Release -o publish

    - name: Obfuscate JavaScript in publish output
      run: |
        javascript-obfuscator publish/wwwroot/js \
          --output publish/wwwroot/js \
          --compact true \
          --self-defending true \
          --control-flow-flattening true \
          --control-flow-flattening-threshold 1 \
          --dead-code-injection true \
          --dead-code-injection-threshold 1 \
          --string-array true \
          --string-array-encoding base64 \
          --string-array-threshold 1 \
          --rename-globals true \
          --identifier-names-generator mangled \
          --numbers-to-expressions true \
          --simplify true \
          --transform-object-keys true

    - name: Patch base href for GitHub Pages
      run: sed -i 's|<base href=\"/\" />|<base href=\"/Discogg/\" />|' publish/wwwroot/index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./publish/wwwroot
        publish_branch: gh-pages